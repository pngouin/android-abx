# git-cliff configuration -- https://git-cliff.org/docs/configuration
#
# Regenerated on every tagged release by .github/workflows/publish.yml, which
# also uses this same config (with --latest --strip header) to produce the
# GitHub release body.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file, generated
automatically from [Conventional Commits](https://www.conventionalcommits.org/)
history by [git-cliff](https://git-cliff.org/).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
topo_order = false
sort_commits = "oldest"

# Ordered via the "<!-- N -->" prefix (stripped from the rendered heading by
# `striptags` in the body template above) -- controls section order, not
# just matching.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^doc", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^style", group = "<!-- 6 -->Styling" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^chore", group = "<!-- 8 -->Miscellaneous Tasks" },
  { message = ".*", group = "<!-- 9 -->Other" },
]
